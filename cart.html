<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Floréa</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="app-container page-transition">
    
    <div id="header-root"></div>

    <main class="grid mt-sm mb-xl" style="grid-template-columns: 2fr 1fr; gap: var(--space-lg);">
        
        <!-- Cart Items -->
        <div class="bento-card" style="padding: var(--space-lg);">
            <h2 id="cart-title" style="font-size: 2.5rem; margin-bottom: var(--space-lg);">Your Cart</h2>
            
            <div id="cart-items" class="flex flex-col gap-md">
                <!-- Injected via JS -->
            </div>
            
            <div id="empty-cart-msg" class="text-center p-xl hidden" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px;">
                <i class="ph ph-shopping-bag text-muted mb-md" style="font-size: 56px;"></i>
                <h3 class="mb-sm">Your cart is empty</h3>
                <p class="text-muted mb-lg">You have no items in your shopping cart.</p>
                <a href="shop.html" class="pill-btn hover-elevate mt-md" style="background: #111; color: #FFF; border: none; padding: 12px 32px; font-size: 0.95rem;">Continue Shopping</a>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="bento-card" style="padding: var(--space-lg); background: #F9F9F9; display: flex; flex-direction: column;">
            <h3 style="font-size: 1.5rem; margin-bottom: var(--space-md);">Order Summary</h3>
            
            <div class="flex flex-col gap-sm" style="flex: 1;">
                <div class="flex justify-between text-muted">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">$0.00</span>
                </div>
                <div class="flex justify-between text-muted">
                    <span>Shipping</span>
                    <span id="cart-shipping">Calculated at checkout</span>
                </div>
                <div class="flex justify-between text-muted">
                    <span>Taxes</span>
                    <span>$0.00</span>
                </div>
                
                <div class="flex justify-between mt-md pt-md" style="border-top: 1px solid #E0E0E0;">
                    <span style="font-weight: 600; font-size: 1.2rem;">Total</span>
                    <span id="cart-total" style="font-weight: 600; font-size: 1.2rem;">$0.00</span>
                </div>
            </div>
            
            <button id="checkout-btn" class="pill-btn hover-elevate w-full mt-lg" style="background: #111; color: #FFF; border: none; padding: 16px; font-size: 1.1rem;" onclick="window.components?.showToast('Checkout flow would begin here.', 'success')">Checkout</button>
            
            <div class="flex items-center justify-center gap-xs mt-sm text-muted text-sm">
                <i class="ph ph-lock-key"></i> Secure Checkout
            </div>
        </div>

    </main>
    
    <div id="footer-root"></div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script>
      document.addEventListener('DOMContentLoaded', () => {
          const renderCart = () => {
              const cartItems = window.store.cart;
              const container = document.getElementById('cart-items');
              const emptyMsg = document.getElementById('empty-cart-msg');
              const subtotalEl = document.getElementById('cart-subtotal');
              const totalEl = document.getElementById('cart-total');
              const titleEl = document.getElementById('cart-title');

              titleEl.textContent = `Your Cart (${cartItems.reduce((sum, item) => sum + item.quantity, 0)})`;

              if (cartItems.length === 0) {
                  container.innerHTML = '';
                  emptyMsg.classList.remove('hidden');
                  subtotalEl.textContent = '$0.00';
                  totalEl.textContent = '$0.00';
                  document.getElementById('checkout-btn').disabled = true;
                  document.getElementById('checkout-btn').style.opacity = '0.5';
                  return;
              }

              emptyMsg.classList.add('hidden');
              document.getElementById('checkout-btn').disabled = false;
              document.getElementById('checkout-btn').style.opacity = '1';

              container.innerHTML = cartItems.map(item => `
                  <div class="flex gap-md" style="padding-bottom: var(--space-md); border-bottom: 1px solid #E0E0E0;">
                      <a href="product.html?id=${item.id}"><img src="${item.images[0]}" style="width: 100px; height: 100px; border-radius: 16px; object-fit: contain; background: #F0F0F0; padding: 12px;"></a>
                      <div class="flex flex-col justify-between flex-1">
                          <div class="flex justify-between items-start">
                              <div>
                                  <h4 style="margin-bottom: 4px; font-size: 1.05rem;">${item.name}</h4>
                                  <p class="text-muted text-sm mb-xs">${item.category}</p>
                                  <span class="price" style="font-weight: 600;">$${item.price}</span>
                              </div>
                              <button onclick="window.store.removeFromCart('${item.id}')" class="icon-btn-transparent-small" style="width: 32px; height: 32px; color: var(--accent-red); background: #FFF3F3;"><i class="ph ph-trash"></i></button>
                          </div>
                          <div class="flex items-center gap-sm mt-sm w-fit" style="background: #F5F5F7; border-radius: var(--radius-pill); padding: 4px;">
                              <button class="icon-btn-transparent-small" onclick="window.store.updateQuantity('${item.id}', ${item.quantity - 1})" style="width: 32px; height: 32px; background: white;"><i class="ph ph-minus"></i></button>
                              <span style="font-weight: 500; width: 24px; text-align: center;">${item.quantity}</span>
                              <button class="icon-btn-transparent-small" onclick="window.store.updateQuantity('${item.id}', ${item.quantity + 1})" style="width: 32px; height: 32px; background: white;"><i class="ph ph-plus"></i></button>
                          </div>
                      </div>
                  </div>
              `).join('');

              const total = window.store.getCartTotal();
              subtotalEl.textContent = `$${total.toFixed(2)}`;
              totalEl.textContent = `$${total.toFixed(2)}`;
          };

          // Listen for store updates to re-render
          window.store.subscribe(renderCart);
          
          // Initial render if data is already there
          renderCart();
      });
  </script>
</body>
</html>
